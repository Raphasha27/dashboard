name: Continuous Integration

on:
  workflow_dispatch:

  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  python:
  workflow_dispatch:

    name: Streamlit (Lint & Setup)
    runs-on:
  workflow_dispatch:
 ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version:
  workflow_dispatch:
 '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  security_scan:
    name: Security Scan (Trivy)
    needs: python
    runs-on:
  workflow_dispatch:
 ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

